"""
Alembic configuration file
"""

# This is the Alembic Config object, which provides the values of the 'Config'
# section and other Alembic settings.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default value is 
# %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be named with the date
# and time they were generated
# file_template = %%(created_at)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present; can use relative
# and absolute paths, too it makes the files callable as modules when they are
# not changed; Python does require importable packages; leave blank
# as defaults.

sqlalchemy.url = sqlite:///./employees.db

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
